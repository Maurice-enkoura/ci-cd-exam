name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: monsite
      IMAGE_TAG: latest
      DOCKER_REGISTRY: docker.io
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ ********** }}" | docker login -u "mauriceenkoura" 

      - name: Build Docker Image
        run: docker build -t mauriceenkoura/$IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker Image
        run: docker push mauriceenkoura/$IMAGE_NAME:$IMAGE_TAG

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mauriceenkoura/monsite:latest'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Pull image
        run: docker pull mauriceenkoura/monsite:latest

      - name: Stop old container
        run: docker stop monsite || true

      - name: Remove old container
        run: docker rm monsite || true

      - name: Run new container
        run: docker run -d -p 80:80 --name monsite mauriceenkoura/monsite:latest